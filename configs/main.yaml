experiment:
  name: korean_rubric_grounding_pairwise_v2
  seed: 20260420
  smoke_test: false
  output_dir: runs/korean_rubric_grounding_pairwise_v2
  drop_tie_pairs: true
  pairwise_tie_breaker: A

api:
  openai_api_key_env: OPENAI_API_KEY
  openai_base_url: null
  request_timeout_seconds: 120
  max_retries: 4

models:
  evaluator_model: gpt-oss-120b
  rubric_generators:
    qwen_small: Qwen/Qwen3-4B-FP8
    qwen_large: Qwen/Qwen3-32B
    gemma_small: google/gemma-4-E4B-it
    gemma_large: google/gemma-4-31B-it

data:
  meta_eval_datasets:
    - dataset_name: HAERAE-HUB/KUDGE
      use_pairwise_like_subsets_only: true
      include_false_subset_if_available: true
    - dataset_name: HAERAE-HUB/Korean-Human-Judgements

splits:
  calibration_ratio: 0.2
  test_ratio: 0.8
  split_unit: prompt_id
  seed: 20260420

retrieval:
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

auxiliary_response_generation:
  model: gpt-5
  num_samples: 8
  temperature: null
  top_p: null
  max_new_tokens: 4096
  reasoning_effort: low
  independent_sampling: true

rubric_generation:
  rar_pairwise_reference:
    min_items: 7
    max_items: 20
    max_output_tokens: 1800
    temperature: 0.2
  rar_pairwise_sample:
    min_items: 7
    max_items: 20
    max_output_tokens: 1800
    temperature: 0.2
  rrd_pairwise:
    initial_criteria: 8
    max_final_criteria: 12
    max_depth: 2
    decompose_if_satisfied_by_more_than: 3
    redundancy_cosine_threshold: 0.86
    max_output_tokens: 1400
    temperature: 0.2
  llm_weighting:
    max_output_tokens: 512
    temperature: 0.0

pairwise_evaluation:
  temperature: 0.0
  max_output_tokens: 512
  json_retry_limit: 2

binary_rubric_evaluation:
  temperature: 0.0
  max_output_tokens: 64
  json_retry_limit: 2

runtime:
  generation_concurrency: 30

run:
  do_analysis: false
  do_plots: false
  do_reports: false
